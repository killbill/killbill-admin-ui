require:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec
  - rubocop-thread_safety

inherit_mode:
  merge:
    - Exclude

AllCops:
  Exclude:
    - 'test/dummy/**/*'
    - 'app/controllers/kaui/engine_controller.rb' # Too much magic going on
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2

Gemspec/RequiredRubyVersion:
  Enabled: false

Layout/LineLength:
  Enabled: false

# Alternative?
Gemspec/RubyVersionGlobalsUsage:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/BlockNesting:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/EmptyElse:
  EnforcedStyle: empty

# Rails cops
Rails:
  Enabled: true

Rails/I18nLocaleTexts:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

# RSpec cops
RSpec:
  Enabled: true

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

# Performance cops
Performance:
  Enabled: true

# Thread Safety cops
ThreadSafety:
  Enabled: true

ThreadSafety/ClassAndModuleAttributes:
  Enabled: false

ThreadSafety/DirChdir:
  Exclude:
    - 'script/sandbox'

# CLI tool uses exit() for control flow
Rails/Exit:
  Exclude:
    - 'lib/kaui/installer/installer.rb'

# Legacy tests - migration to IntegrationTest is non-trivial
Rails/ActionControllerTestCase:
  Exclude:
    - 'test/functional/**/*'
